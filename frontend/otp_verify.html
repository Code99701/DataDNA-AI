<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Verify Identity | DataDNA AI</title>
    <meta name="description" content="Enter your one-time verification code to access DataDNA AI."/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#004e9f",
                        "primary-container": "#0066cc",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#dfe8ff",
                        "primary-fixed": "#d7e3ff",
                        "surface": "#f9f9fb",
                        "surface-container": "#eeeef0",
                        "surface-container-low": "#f3f3f5",
                        "surface-container-high": "#e8e8ea",
                        "surface-container-highest": "#e2e2e4",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#1a1c1d",
                        "on-surface-variant": "#414753",
                        "outline": "#727784",
                        "outline-variant": "#c1c6d5",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
        }
        @keyframes successPulse {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes checkmark {
            0% { stroke-dashoffset: 50; }
            100% { stroke-dashoffset: 0; }
        }

        .fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
        .slide-down { animation: slideDown 0.4s ease-out forwards; }
        .shake { animation: shake 0.5s ease-in-out; }
        .float-animation { animation: float 6s ease-in-out infinite; }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .otp-input {
            transition: all 0.2s ease;
            caret-color: #004e9f;
        }
        .otp-input:focus {
            border-color: #004e9f;
            box-shadow: 0 0 0 3px rgba(0, 78, 159, 0.15);
            background: #ffffff;
        }
        .otp-input.filled {
            border-color: #004e9f;
            background: #f0f4ff;
        }
        .otp-input.error {
            border-color: #ba1a1a;
            box-shadow: 0 0 0 3px rgba(186, 26, 26, 0.1);
        }

        .success-overlay {
            animation: fadeInUp 0.5s ease-out forwards;
        }
        .success-icon {
            animation: successPulse 0.6s ease-out forwards;
        }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Background decorations -->
    <div class="absolute inset-0 pointer-events-none overflow-hidden">
        <div class="absolute -top-32 -right-32 w-[500px] h-[500px] bg-primary-fixed/30 rounded-full blur-[120px] float-animation"></div>
        <div class="absolute -bottom-32 -left-32 w-[500px] h-[500px] bg-blue-200/30 rounded-full blur-[120px] float-animation" style="animation-delay: -3s;"></div>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="fixed top-6 right-6 z-[100] flex flex-col gap-3 max-w-sm"></div>

    <!-- Main Card -->
    <div id="otp-card" class="relative z-10 w-full max-w-md mx-4 fade-in-up">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="landing_frontend.html" class="inline-flex items-center gap-2 text-2xl font-extrabold tracking-tighter text-on-surface hover:text-primary transition-colors">
                <span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">fingerprint</span>
                DataDNA AI
            </a>
        </div>

        <!-- Card -->
        <div class="glass-card rounded-3xl shadow-[0_24px_64px_rgba(26,28,29,0.08)] p-8 text-center">
            <!-- Lock Icon -->
            <div class="w-20 h-20 mx-auto mb-6 bg-primary-fixed/50 rounded-2xl flex items-center justify-center">
                <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">verified_user</span>
            </div>

            <h1 class="text-2xl font-extrabold tracking-tight text-on-surface mb-2">Two-Factor Verification</h1>
            <p class="text-sm text-on-surface-variant mb-2">We sent a 6-digit code to</p>
            <p id="user-email" class="text-sm font-bold text-primary mb-8">loading...</p>

            <!-- OTP Inputs -->
            <div id="otp-inputs" class="flex justify-center gap-3 mb-6">
                <input class="otp-input w-12 h-14 text-center text-xl font-bold rounded-xl border-2 border-outline-variant/30 bg-surface-container-low focus:outline-none" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code" data-index="0"/>
                <input class="otp-input w-12 h-14 text-center text-xl font-bold rounded-xl border-2 border-outline-variant/30 bg-surface-container-low focus:outline-none" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="1"/>
                <input class="otp-input w-12 h-14 text-center text-xl font-bold rounded-xl border-2 border-outline-variant/30 bg-surface-container-low focus:outline-none" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="2"/>
                <div class="flex items-center">
                    <div class="w-2 h-2 rounded-full bg-outline-variant/60"></div>
                </div>
                <input class="otp-input w-12 h-14 text-center text-xl font-bold rounded-xl border-2 border-outline-variant/30 bg-surface-container-low focus:outline-none" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="3"/>
                <input class="otp-input w-12 h-14 text-center text-xl font-bold rounded-xl border-2 border-outline-variant/30 bg-surface-container-low focus:outline-none" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="4"/>
                <input class="otp-input w-12 h-14 text-center text-xl font-bold rounded-xl border-2 border-outline-variant/30 bg-surface-container-low focus:outline-none" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="5"/>
            </div>

            <!-- Timer -->
            <div class="flex items-center justify-center gap-2 mb-6">
                <span class="material-symbols-outlined text-outline text-sm">schedule</span>
                <span id="timer-text" class="text-sm text-on-surface-variant">Code expires in <span id="countdown" class="font-bold text-primary">5:00</span></span>
            </div>

            <!-- Verify button -->
            <button id="verify-btn" onclick="handleVerify()" class="w-full py-3.5 rounded-xl text-white font-semibold text-sm flex items-center justify-center gap-2" style="background: linear-gradient(135deg, #004e9f 0%, #0066cc 100%); transition: all 0.3s ease;" onmouseenter="this.style.boxShadow='0 8px 24px rgba(0,78,159,0.35)';this.style.transform='translateY(-1px)'" onmouseleave="this.style.boxShadow='none';this.style.transform='translateY(0)'">
                <span id="verify-btn-text">Verify & Continue</span>
                <span id="verify-spinner" class="hidden w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
            </button>

            <!-- Resend -->
            <div class="mt-6 flex items-center justify-center gap-1">
                <span class="text-sm text-on-surface-variant">Didn't receive the code?</span>
                <button id="resend-btn" onclick="handleResend()" class="text-sm font-semibold text-primary hover:underline disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    Resend (<span id="resend-countdown">30</span>s)
                </button>
            </div>

            <!-- Back to login -->
            <a href="login.html" class="inline-flex items-center gap-1 text-xs text-outline hover:text-primary mt-4 transition-colors">
                <span class="material-symbols-outlined text-xs">arrow_back</span>
                Back to login
            </a>
        </div>
    </div>

    <!-- Success Overlay (hidden) -->
    <div id="success-overlay" class="hidden fixed inset-0 z-50 bg-surface/90 backdrop-blur-sm flex items-center justify-center">
        <div class="success-overlay text-center">
            <div class="success-icon w-24 h-24 mx-auto mb-6 bg-green-100 rounded-full flex items-center justify-center">
                <span class="material-symbols-outlined text-green-600 text-5xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
            </div>
            <h2 class="text-2xl font-extrabold text-on-surface mb-2">Verified Successfully!</h2>
            <p class="text-sm text-on-surface-variant">Redirecting to your dashboard...</p>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let timerInterval = null;
        let resendInterval = null;

        // ── Init ────────────────────────────────────────────
        (function init() {
            const email = sessionStorage.getItem('otp_email');
            if (!email) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('user-email').textContent = email;
            startCountdown(300); // 5 minutes
            startResendCooldown(30);
            setupOTPInputs();
        })();

        // ── OTP Input handlers ──────────────────────────────
        function setupOTPInputs() {
            const inputs = document.querySelectorAll('.otp-input');

            inputs.forEach((input, idx) => {
                input.addEventListener('input', (e) => {
                    const val = e.target.value.replace(/\D/g, '');
                    e.target.value = val.slice(-1);

                    if (val && idx < inputs.length - 1) {
                        inputs[idx + 1].focus();
                    }

                    // Update visual state
                    e.target.classList.toggle('filled', !!val);
                    e.target.classList.remove('error');

                    // Auto-verify when all filled
                    const code = getOTPCode();
                    if (code.length === 6) {
                        handleVerify();
                    }
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !input.value && idx > 0) {
                        inputs[idx - 1].focus();
                        inputs[idx - 1].value = '';
                        inputs[idx - 1].classList.remove('filled');
                    }
                });

                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const pasted = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 6);
                    pasted.split('').forEach((ch, i) => {
                        if (inputs[i]) {
                            inputs[i].value = ch;
                            inputs[i].classList.add('filled');
                        }
                    });
                    if (pasted.length === 6) {
                        inputs[5].focus();
                        handleVerify();
                    } else if (pasted.length > 0) {
                        inputs[Math.min(pasted.length, 5)].focus();
                    }
                });
            });

            // Focus first input
            inputs[0].focus();
        }

        function getOTPCode() {
            return Array.from(document.querySelectorAll('.otp-input'))
                .map(input => input.value)
                .join('');
        }

        // ── Countdown timer ─────────────────────────────────
        function startCountdown(seconds) {
            let remaining = seconds;
            const display = document.getElementById('countdown');

            if (timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                remaining--;
                const mins = Math.floor(remaining / 60);
                const secs = remaining % 60;
                display.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;

                if (remaining <= 60) {
                    display.classList.remove('text-primary');
                    display.classList.add('text-error');
                }

                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    display.textContent = 'Expired';
                    showToast('Verification code expired. Please request a new one.', 'error');
                }
            }, 1000);
        }

        // ── Resend cooldown ─────────────────────────────────
        function startResendCooldown(seconds) {
            let remaining = seconds;
            const btn = document.getElementById('resend-btn');
            const display = document.getElementById('resend-countdown');
            btn.disabled = true;

            if (resendInterval) clearInterval(resendInterval);

            resendInterval = setInterval(() => {
                remaining--;
                display.textContent = remaining;

                if (remaining <= 0) {
                    clearInterval(resendInterval);
                    btn.disabled = false;
                    btn.innerHTML = 'Resend Code';
                }
            }, 1000);
        }

        // ── Toast ───────────────────────────────────────────
        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const colors = {
                error: 'bg-red-50 border-red-200 text-red-700',
                success: 'bg-green-50 border-green-200 text-green-700',
                info: 'bg-blue-50 border-blue-200 text-blue-700',
            };
            const icons = { error: 'error', success: 'check_circle', info: 'info' };

            const toast = document.createElement('div');
            toast.className = `slide-down flex items-center gap-3 px-5 py-4 rounded-xl border ${colors[type]} shadow-lg`;
            toast.innerHTML = `
                <span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">${icons[type]}</span>
                <p class="text-sm font-medium flex-1">${message}</p>
                <button onclick="this.parentElement.remove()" class="opacity-60 hover:opacity-100"><span class="material-symbols-outlined text-sm">close</span></button>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        // ── Verify OTP ──────────────────────────────────────
        async function handleVerify() {
            const otp = getOTPCode();
            const email = sessionStorage.getItem('otp_email');

            if (otp.length !== 6) {
                showToast('Please enter the full 6-digit code', 'error');
                return;
            }

            const btn = document.getElementById('verify-btn');
            const spinner = document.getElementById('verify-spinner');
            btn.disabled = true;
            btn.style.opacity = '0.7';
            spinner.classList.remove('hidden');

            try {
                const res = await fetch(`${API_BASE}/auth/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp }),
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.detail || 'Verification failed');
                }

                // Store auth data
                localStorage.setItem('datadna_token', data.token);
                localStorage.setItem('datadna_user', JSON.stringify(data.user));

                // Show success
                document.getElementById('success-overlay').classList.remove('hidden');
                sessionStorage.removeItem('otp_email');

                // Redirect based on role or redirect param
                setTimeout(() => {
                    const redirectUrl = sessionStorage.getItem('redirect_after_login');
                    if (redirectUrl) {
                        sessionStorage.removeItem('redirect_after_login');
                        window.location.href = redirectUrl;
                    } else if (data.user.role === 'admin') {
                        window.location.href = 'admin_dashboard.html';
                    } else if (data.user.dashboard_access) {
                        window.location.href = 'dashboard_frontend.html';
                    } else {
                        window.location.href = 'dashboard_frontend.html';
                    }
                }, 1500);

            } catch (err) {
                showToast(err.message, 'error');
                // Shake inputs
                const container = document.getElementById('otp-inputs');
                container.style.animation = 'shake 0.5s ease-in-out';
                setTimeout(() => container.style.animation = '', 500);
                // Mark inputs red
                document.querySelectorAll('.otp-input').forEach(i => i.classList.add('error'));
            } finally {
                btn.disabled = false;
                btn.style.opacity = '1';
                spinner.classList.add('hidden');
            }
        }

        // ── Resend OTP ──────────────────────────────────────
        async function handleResend() {
            const email = sessionStorage.getItem('otp_email');
            if (!email) return;

            try {
                const res = await fetch(`${API_BASE}/auth/resend-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.detail || 'Failed to resend code');
                }

                showToast('New verification code sent!', 'success');
                startCountdown(300);
                startResendCooldown(30);

                // Clear inputs
                document.querySelectorAll('.otp-input').forEach(i => {
                    i.value = '';
                    i.classList.remove('filled', 'error');
                });
                document.querySelectorAll('.otp-input')[0].focus();

            } catch (err) {
                showToast(err.message, 'error');
            }
        }
    </script>
</body>
</html>
