<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Access Denied | DataDNA AI</title>
    <meta name="description" content="You do not have permission to access this resource."/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#004e9f",
                        "primary-container": "#0066cc",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#d7e3ff",
                        "surface": "#f9f9fb",
                        "surface-container-low": "#f3f3f5",
                        "surface-container-high": "#e8e8ea",
                        "on-surface": "#1a1c1d",
                        "on-surface-variant": "#414753",
                        "outline": "#727784",
                        "outline-variant": "#c1c6d5",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-16px); }
        }
        @keyframes pulse-subtle {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }
        .fade-in-up { animation: fadeInUp 0.7s ease-out forwards; }
        .float-animation { animation: float 6s ease-in-out infinite; }
        .pulse-subtle { animation: pulse-subtle 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Background decorations -->
    <div class="absolute inset-0 pointer-events-none overflow-hidden">
        <div class="absolute -top-32 -right-32 w-[400px] h-[400px] bg-error-container/30 rounded-full blur-[120px] pulse-subtle"></div>
        <div class="absolute -bottom-32 -left-32 w-[400px] h-[400px] bg-primary-fixed/20 rounded-full blur-[120px] float-animation"></div>
    </div>

    <!-- Main Content -->
    <div class="relative z-10 text-center max-w-md mx-4 fade-in-up">
        <!-- Lock Icon -->
        <div class="w-28 h-28 mx-auto mb-8 bg-error-container/50 rounded-3xl flex items-center justify-center rotate-3 hover:rotate-0 transition-transform duration-500">
            <span class="material-symbols-outlined text-error text-6xl" style="font-variation-settings: 'FILL' 1;">lock</span>
        </div>

        <h1 class="text-4xl font-extrabold tracking-tighter text-on-surface mb-3">Access Denied</h1>
        <p class="text-lg text-on-surface-variant mb-2">You don't have permission to access this page.</p>
        <p class="text-sm text-outline mb-10">Contact your system administrator to request access to the dashboard.</p>

        <!-- User info (if logged in) -->
        <div id="user-info" class="hidden bg-white/80 backdrop-blur-lg rounded-2xl p-5 mb-8 border border-outline-variant/20 shadow-sm">
            <div class="flex items-center gap-3">
                <div id="user-avatar" class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-sm font-bold text-on-surface-variant">U</div>
                <div class="text-left">
                    <p id="user-name" class="text-sm font-semibold text-on-surface">User</p>
                    <p id="user-email" class="text-xs text-on-surface-variant">user@email.com</p>
                </div>
                <span class="ml-auto inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-bold bg-surface-container-high text-on-surface-variant">
                    <span class="material-symbols-outlined text-xs">person</span>
                    User Role
                </span>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <a href="landing_frontend.html" class="px-8 py-3.5 rounded-xl font-semibold text-sm text-white flex items-center gap-2 shadow-lg hover:shadow-xl transition-all hover:-translate-y-0.5" style="background: linear-gradient(135deg, #004e9f 0%, #0066cc 100%);">
                <span class="material-symbols-outlined text-sm">home</span>
                Go Home
            </a>
            <a href="contact_frontend.html" class="px-8 py-3.5 rounded-xl border border-outline-variant/30 font-semibold text-sm text-on-surface flex items-center gap-2 hover:bg-surface-container-low transition-all">
                <span class="material-symbols-outlined text-sm">mail</span>
                Contact Admin
            </a>
        </div>

        <!-- Logout -->
        <button onclick="handleLogout()" class="mt-6 text-xs text-outline hover:text-error transition-colors inline-flex items-center gap-1">
            <span class="material-symbols-outlined text-xs">logout</span>
            Sign out and try another account
        </button>
    </div>

    <script>
        // Show user info if logged in
        const user = JSON.parse(localStorage.getItem('datadna_user') || '{}');
        if (user.email) {
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('user-name').textContent = user.name || 'User';
            document.getElementById('user-email').textContent = user.email;
            const initials = (user.name || 'U').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
            document.getElementById('user-avatar').textContent = initials;
        }

        function handleLogout() {
            localStorage.removeItem('datadna_token');
            localStorage.removeItem('datadna_user');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
